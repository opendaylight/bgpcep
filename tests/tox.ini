[tox]
skipsdist = true
envlist =
    pytest

[testenv]
passenv =
    http_proxy
    HTTP_PROXY
    https_proxy
    HTTPS_PROXY
    no_proxy
    NO_PROXY
    JAVA_HOME
usedevelop = true
basepython = python3
deps =
    -r{toxinidir}/requirements.txt
setenv =
    STEP_DEFAULT_TAGS = --step-exclude=exclude

[testenv:pytest]
commands =
    pytest --alluredir=allure-results {env:STEP_DEFAULT_TAGS} {posargs}

[pytest]
minversion = 8.4
addopts = -rAsv --show-capture=no
log_cli = true
log_level = DEBUG
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
markers =
    bgp: BGP protocol tests
    ibgp: Internal BGP peer tests
    ebgp: External BGP peer tests
    pcep: PCEP protocol tests
    lsp: LSP management tests
    pcep_statistics: PCEP statistics tests
    performance: Performance / load tests
    functional: Functional feature tests
    single_device: Tests using a single peer/device
    multi_device: Tests using multiple peers/devices
    session: Basic BGP session establishment and management
    app_peer: BGP application peer (RESTCONF-driven route injection)
    authentication: Authentication tests (TCP-MD5 for BGP or PCEP)
    flowspec: BGP Flowspec address family
    l3vpn: L3VPN IPv4 unicast address family
    l3vpn_mcast: L3VPN multicast address family
    multipath: BGP multipath / Add-Path route selection
    evpn: Ethernet VPN address family
    mvpn: Multicast VPN address family
    route_refresh: BGP Route Refresh capability
    bmp: BGP Monitoring Protocol
    rt_constrain: Route-Target Constraint family
    ipv6: IPv6 unicast address family
    llgr: Long-Lived Graceful Restart
    policies: BGP RIB policies
    route_reflection: Route reflection and cluster-id behaviour
    bgp_ls: BGP Link State / LSP state distribution
    lsp_management: PCEP LSP delegation, update and instantiation
    smoke: Fast-running functional tests for the GHA verify job
        (strictly constrained to < 10 min)
